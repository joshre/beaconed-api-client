  /api/v1/bulk_optimizations:
    post:
      summary: Create bulk optimization
      description: |
        Submit a list of product IDs for batch optimization. Each product is processed
        independently — failures on one product don't affect others.
      operationId: createBulkOptimization
      tags:
        - Bulk Optimizations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_ids
              properties:
                product_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Array of product UUIDs to optimize
                fields:
                  type: array
                  items:
                    type: string
                    enum: [title, description, alt_text, meta_title, meta_description, tags, product_type, og_title, og_description]
                  description: Fields to optimize. Defaults to all fields if omitted.
      responses:
        '202':
          description: Bulk optimization queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      queued_count:
                        type: integer
                      queued_product_ids:
                        type: array
                        items:
                          type: string
                          format: uuid
                      skipped_product_ids:
                        type: array
                        items:
                          type: string
                          format: uuid
                      credits_remaining:
                        type: integer
                        nullable: true
                        description: Remaining credits. Null for unlimited plans.
      x-request-example: '{"product_ids": ["uuid-1", "uuid-2", "uuid-3"], "fields": ["title", "description"]}'
      x-response-example: |
        {
          "data": {
            "queued_count": 3,
            "queued_product_ids": ["uuid-1", "uuid-2", "uuid-3"],
            "skipped_product_ids": [],
            "credits_remaining": 47
          }
        }

  /api/v1/settings:
    get:
      summary: Get settings
      description: Returns your account's optimization settings including brand voice, keyword preferences, and default fields.
      operationId: getSettings
      tags:
        - Settings
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      brand_voice:
                        type: string
                        nullable: true
                        description: Brand voice/tone guidance for AI-generated content
                      brand_context:
                        type: string
                        nullable: true
                        description: Additional brand context for AI optimization
                      required_keywords:
                        type: array
                        items:
                          type: string
                        nullable: true
                        description: Keywords that must appear in optimized content
                      excluded_keywords:
                        type: array
                        items:
                          type: string
                        nullable: true
                        description: Keywords to avoid in optimized content
                      default_fields:
                        type: array
                        items:
                          type: string
                        description: Default fields to optimize when none specified
                      auto_push_on_approve:
                        type: boolean
                        description: Whether approved optimizations are automatically pushed to Shopify
      x-response-example: |
        {
          "data": {
            "brand_voice": "Friendly, approachable, expert",
            "brand_context": "Premium home decor for modern living",
            "required_keywords": ["handcrafted", "sustainable"],
            "excluded_keywords": ["cheap"],
            "default_fields": ["title", "description", "meta_title", "meta_description"],
            "auto_push_on_approve": false
          }
        }

tags:
  - name: Products
    description: |
      Products represent your catalog items. Use these endpoints to list, create, update,
      sync from Shopify, and request AI optimizations.
    x-docs-model:
      schema: ProductDetail
      description: |
        The product model contains core catalog data, readiness scoring, and references to
        optimizations.
  - name: Scores
    description: |
      Scores measure how well a product is structured for AI shopping agents. Each score
      breaks down into category-level assessments across title, description, images, and metadata.
    x-docs-model:
      schema: ScoreDetail
      description: |
        The score model contains an overall composite score and per-category scores for
        title, description, images, and metadata.
  - name: Optimizations
    description: |
      Optimizations are AI-generated improvements to product content. Each optimization
      follows a lifecycle: pending, approved or rejected, then applied or reverted.
    x-docs-model:
      schema: OptimizationDetail
      description: |
        The optimization model contains the AI-generated content suggestions, their status
        in the approval workflow, and the rationale behind each change.
  - name: Webhooks
    description: |
      Subscribe to real-time events when optimizations change status, products are scored,
      or syncs complete. Webhooks are delivered as POST requests to your URL.
    x-docs-model:
      schema: WebhookDetail
      description: |
        The webhook model contains the endpoint URL, subscribed events, signing secret,
        and delivery status information.
  - name: Bulk Optimizations
    description: Optimize multiple products in a single request. Each product is queued for optimization and processed asynchronously.
  - name: Settings
    description: Retrieve your account configuration, usage limits, and current credit balance.
